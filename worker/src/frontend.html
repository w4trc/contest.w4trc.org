<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W4TRC Field Day</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border:  #2e2e2e;
  --text:    #e8e8e8;
  --muted:   #777;
  --green:   #22c55e;
  --blue:    #3b82f6;
  --yellow:  #facc15;
  --red:     #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Nav ── */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.callsign {
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  color: var(--yellow);
}
.nav-sep { color: var(--border); }
.status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.75rem;
  color: var(--muted);
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
}
.dot.live  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.error { background: var(--red); }

/* ── Page wrapper ── */
.page { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* ── Stat cards ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
}
.stat-card .val {
  font-size: 2.2rem;
  font-weight: 800;
  line-height: 1;
  color: #fff;
}
.stat-card .val.green  { color: var(--green); }
.stat-card .val.yellow { color: var(--yellow); }
.stat-card .lbl {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* ── Main grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
}
.card.full { grid-column: 1 / -1; }
.card-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── Mode breakdown ── */
.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.mode-title {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); flex-shrink: 0; width: 60px;
}
.mode-bars { flex: 1; display: flex; gap: 10px; min-width: 0; flex-wrap: wrap; }
.mode-item { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 80px; }
.mode-label-row { display: flex; justify-content: space-between; align-items: baseline; }
.mode-name  { font-size: 0.72rem; font-weight: 700; }
.mode-count { font-size: 0.85rem; font-weight: 800; }
.mode-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.mode-fill  { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.mode-raw   { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

/* ── Band bars ── */
.band-list { display: flex; flex-direction: column; gap: 8px; }
.band-row  { display: flex; align-items: center; gap: 8px; }
.band-name  { width: 48px; text-align: right; flex-shrink: 0; font-size: 0.82rem; font-weight: 600; }
.band-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.band-fill  {
  height: 100%; border-radius: 4px; min-width: 3px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.band-count { width: 36px; font-size: 0.82rem; font-weight: 700; }

/* ── Operator list ── */
.op-list { display: flex; flex-direction: column; gap: 7px; }
.op-row  { display: flex; align-items: center; gap: 8px; }
.op-rank  { width: 18px; text-align: right; font-size: 0.68rem; color: var(--muted); flex-shrink: 0; }
.op-call  { width: 72px; flex-shrink: 0; font-size: 0.82rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
.op-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.op-fill  {
  height: 100%; background: var(--blue); border-radius: 3px; min-width: 3px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.op-count { width: 32px; font-size: 0.82rem; font-weight: 700; }

/* ── Map ── */
#section-map { height: 450px; width: 100%; border-radius: 10px; background: #0d0d0d; }
.leaflet-tooltip {
  background: #1a1a1a; border: 1px solid #2e2e2e;
  color: #e8e8e8; font-size: 12px; box-shadow: none;
}
.leaflet-tooltip-top::before  { border-top-color:    #2e2e2e; }
.leaflet-tooltip-bottom::before { border-bottom-color: #2e2e2e; }
.leaflet-tooltip-left::before  { border-left-color:   #2e2e2e; }
.leaflet-tooltip-right::before { border-right-color:  #2e2e2e; }
.leaflet-control-attribution { background: rgba(15,15,15,0.7) !important; color: #555 !important; }
.leaflet-control-attribution a { color: #555 !important; }

/* ── On Air Now ── */
.on-air {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.on-air-title {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); flex-shrink: 0;
}
.radio-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border-radius: 8px;
  padding: 8px 14px;
}
.radio-tx {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--muted);
}
.radio-tx.active { background: var(--red); box-shadow: 0 0 6px var(--red); }
.radio-nr   { font-size: 0.65rem; color: var(--muted); }
.radio-op   { font-size: 0.9rem; font-weight: 700; }
.radio-band { font-size: 0.75rem; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
.radio-freq { font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; }
.radio-mode { font-size: 0.72rem; color: var(--muted); }

/* ── Recent QSOs ── */
.qso-list { display: flex; flex-direction: column; gap: 2px; }
.qso-row {
  display: grid;
  grid-template-columns: 44px 1fr 52px 38px 1fr;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.qso-row.new-section {
  animation: flash-row 2s ease-out forwards;
}
@keyframes flash-row {
  0%   { background: rgba(250,204,21,0.25); }
  100% { background: transparent; }
}
.qso-time { font-size: 0.72rem; color: var(--muted); font-variant-numeric: tabular-nums; }
.qso-call { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.03em; }
.qso-band {
  font-size: 0.68rem; font-weight: 700; padding: 2px 5px;
  border-radius: 3px; text-align: center;
}
.qso-section { font-size: 0.78rem; font-weight: 600; color: var(--green); }
.qso-section.dim { color: var(--muted); }
.qso-op { font-size: 0.72rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Sections ── */
.needed-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  padding: 2px 10px; border-radius: 4px; cursor: pointer;
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  transition: border-color 0.2s, color 0.2s;
}
.needed-btn:hover  { border-color: var(--blue); color: var(--blue); }
.needed-btn.active { border-color: var(--yellow); color: var(--yellow); }
.sec-groups { display: flex; flex-direction: column; gap: 14px; }
.sec-group-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-bottom: 6px;
}
.sec-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
.sec {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em;
  padding: 3px 7px; border-radius: 4px; min-width: 34px;
  text-align: center; transition: background 0.3s, color 0.3s;
}
.sec.worked   { background: var(--green); color: #000; }
.sec.unworked { background: var(--surface2); color: #444; }
.sec.flash {
  animation: flash-sec 2s ease-out forwards;
}
@keyframes flash-sec {
  0%   { background: var(--yellow); color: #000; box-shadow: 0 0 10px var(--yellow); }
  60%  { background: var(--yellow); color: #000; }
  100% { background: var(--green);  color: #000; box-shadow: none; }
}
</style>
</head>
<body>

<nav>
  <span class="callsign">W4TRC</span>
  <span class="nav-sep">|</span>
  <span style="color:var(--muted);font-size:0.85rem">Field Day Dashboard</span>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="updated-time">Connecting…</span>
  </div>
</nav>

<div class="page">

  <!-- Stat cards -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="val" id="total">—</div>
      <div class="lbl">Total QSOs</div>
    </div>
    <div class="stat-card">
      <div class="val green" id="rate-hour">—</div>
      <div class="lbl">QSOs / last hour</div>
    </div>
    <div class="stat-card">
      <div class="val green" id="rate-10">—</div>
      <div class="lbl">QSOs / last 10 min</div>
    </div>
    <div class="stat-card">
      <div class="val yellow" id="sec-count">—</div>
      <div class="lbl">Sections worked</div>
    </div>
    <div class="stat-card">
      <div class="val" id="score" style="color:#a78bfa">—</div>
      <div class="lbl">Est. points</div>
    </div>
  </div>

  <!-- Mode breakdown -->
  <div id="mode-wrap"></div>

  <!-- On Air Now -->
  <div id="on-air-wrap"></div>

  <!-- Main grid -->
  <div class="grid">

    <!-- Bands -->
    <div class="card">
      <div class="card-title">By Band</div>
      <div class="band-list" id="band-list"></div>
    </div>

    <!-- Operators -->
    <div class="card">
      <div class="card-title">By Operator</div>
      <div class="op-list" id="op-list"></div>
    </div>

    <!-- Recent QSOs -->
    <div class="card">
      <div class="card-title">Recent QSOs</div>
      <div class="qso-list" id="qso-list"></div>
    </div>

    <!-- Cumulative chart -->
    <div class="card full">
      <div class="card-title">Cumulative QSOs</div>
      <div id="chart"></div>
    </div>

    <!-- Map -->
    <div class="card full" style="padding:0;overflow:hidden">
      <div id="section-map"></div>
    </div>

    <!-- Sections -->
    <div class="card full">
      <div class="card-title">
        <span>ARRL / RAC Sections — <span id="sec-fraction">0 / 86</span> worked</span>
        <button class="needed-btn" id="needed-btn" onclick="toggleNeeded()">Show Needed</button>
      </div>
      <div class="sec-groups" id="sec-groups"></div>
    </div>

  </div>
</div>

<script>
var SECTIONS = {
  US: ["CT","EMA","ME","NH","RI","VT","WMA",
       "ENY","NLI","NNJ","NNY","SNJ","WNY",
       "DE","EPA","MDC","WPA",
       "IL","IN","WI",
       "KY","MI","OH",
       "MN","ND","SD",
       "AR","LA","MS","TN",
       "IA","KS","MO","NE",
       "CO","NM","UT","WY",
       "AK","EWA","ID","MT","OR","WWA",
       "EB","NV","PAC","SCV","SF","SJV","SV",
       "AL","GA","NFL","SFL","WCF","PR","VI",
       "AZ","LAX","ORG","SB","SDG",
       "NTX","OK","STX","WTX",
       "NC","SC","VA","WV"],
  CANADA: ["AB","BC","GH","MB","NB","NL","NS","ONE","ONN","ONS","PE","QC","SK","TER"],
  DX: ["DX"]
};

var TOTAL_SECTIONS = Object.values(SECTIONS).reduce(function(a, b) { return a + b.length; }, 0);

var BAND_COLORS = {
  "160m":"#ef4444","80m":"#f97316","60m":"#eab308","40m":"#22c55e",
  "30m":"#06b6d4","20m":"#3b82f6","17m":"#8b5cf6","15m":"#ec4899",
  "12m":"#f43f5e","10m":"#fb923c","6m":"#a3e635","2m":"#67e8f9",
  "1.25m":"#c084fc","70cm":"#f9a8d4"
};

var showNeeded = false;
var lastWorked = new Set();
var prevWorked = null; // null on first load so we don't flash everything

function toggleNeeded() {
  showNeeded = !showNeeded;
  var btn = document.getElementById('needed-btn');
  btn.textContent = showNeeded ? 'Show All' : 'Show Needed';
  btn.className = showNeeded ? 'needed-btn active' : 'needed-btn';
  renderSections(lastWorked, new Set());
}

var PHONE_MODES  = ["USB","LSB","SSB","FM","AM","PH"];
var CW_MODES     = ["CW"];
var DIGITAL_MODES = ["FT8","FT4","DIGI","RTTY","PSK","PSK31","PSK63","MFSK","JT65","JT9","DATA","DIGITAL"];

function renderMode(byMode) {
  var wrap = document.getElementById('mode-wrap');
  if (!byMode || byMode.length === 0) { wrap.innerHTML = ''; return; }

  var phone = 0, cw = 0, digital = 0, other = 0;
  var phoneList = [], cwList = [], digitalList = [], otherList = [];

  for (var i = 0; i < byMode.length; i++) {
    var m = byMode[i].mode ? byMode[i].mode.toUpperCase() : '';
    var n = byMode[i].count;
    if (PHONE_MODES.indexOf(m) >= 0)   { phone   += n; phoneList.push(m + ':' + n); }
    else if (CW_MODES.indexOf(m) >= 0) { cw      += n; cwList.push(m + ':' + n); }
    else if (DIGITAL_MODES.indexOf(m) >= 0 || m.indexOf('FT') === 0 || m.indexOf('JS') === 0) {
      digital += n; digitalList.push(m + ':' + n);
    } else if (m) { other += n; otherList.push(m + ':' + n); }
  }

  var total = phone + cw + digital + other || 1;
  var groups = [
    { name: 'Phone',   count: phone,   color: '#facc15', raw: phoneList },
    { name: 'CW',      count: cw,      color: '#22c55e', raw: cwList },
    { name: 'Digital', count: digital, color: '#3b82f6', raw: digitalList },
  ];
  if (other > 0) groups.push({ name: 'Other', count: other, color: '#888', raw: otherList });

  var html = '<div class="mode-card"><div class="mode-title">By Mode</div><div class="mode-bars">';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    if (g.count === 0) continue;
    var pct = (g.count / total * 100).toFixed(1);
    html += '<div class="mode-item">';
    html += '<div class="mode-label-row"><span class="mode-name" style="color:' + g.color + '">' + g.name + '</span><span class="mode-count">' + g.count + '</span></div>';
    html += '<div class="mode-track"><div class="mode-fill" style="width:' + pct + '%;background:' + g.color + '"></div></div>';
    if (g.raw.length > 0) html += '<div class="mode-raw">' + g.raw.join(' · ') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  wrap.innerHTML = html;
}

function fmtFreqMhz(hz) {
  if (!hz) return '';
  return (hz / 1e6).toFixed(3);
}

function renderOnAir(radios) {
  var wrap = document.getElementById('on-air-wrap');
  if (!radios || radios.length === 0) { wrap.innerHTML = ''; return; }

  var html = '<div class="on-air"><span class="on-air-title">On Air Now</span>';
  for (var i = 0; i < radios.length; i++) {
    var r = radios[i];
    if (!r.operator && !r.band) continue;
    var color = BAND_COLORS[r.band] || '#555';
    html += '<div class="radio-item">';
    html += '<div class="radio-tx' + (r.transmitting ? ' active' : '') + '"></div>';
    html += '<div class="radio-nr">R' + r.nr + '</div>';
    html += '<div class="radio-op">' + (r.operator || '—') + '</div>';
    html += '<div class="radio-band" style="background:' + color + ';color:#000">' + (r.band || '') + '</div>';
    html += '<div class="radio-freq">' + fmtFreqMhz(r.freq_hz) + '</div>';
    html += '<div class="radio-mode">' + (r.mode || '') + '</div>';
    html += '</div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function renderChart(cumulative) {
  var container = document.getElementById('chart');
  if (!cumulative || cumulative.length < 2) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:32px 0;font-size:0.8rem">No data yet</p>';
    return;
  }

  var W = 1000, H = 160;
  var pl = 48, pr = 16, pt = 10, pb = 28;
  var iw = W - pl - pr, ih = H - pt - pb;

  var maxN = 0;
  for (var i = 0; i < cumulative.length; i++) if (cumulative[i].n > maxN) maxN = cumulative[i].n;
  if (maxN === 0) maxN = 1;

  var minT = cumulative[0].t;
  var maxT = cumulative[cumulative.length - 1].t;
  var rangeT = maxT - minT || 1;

  function px(t) { return (pl + ((t - minT) / rangeT) * iw).toFixed(1); }
  function py(n) { return (pt + ih - (n / maxN) * ih).toFixed(1); }

  // Line + area
  var linePts = '', areaPts = px(minT) + ',' + (pt + ih);
  for (var i = 0; i < cumulative.length; i++) {
    var cx = px(cumulative[i].t), cy = py(cumulative[i].n);
    linePts  += (i === 0 ? 'M ' : ' L ') + cx + ',' + cy;
    areaPts  += ' ' + cx + ',' + cy;
  }
  areaPts += ' ' + px(maxT) + ',' + (pt + ih);

  // Y gridlines + labels (3 levels)
  var yLevels = [0, Math.round(maxN / 2), maxN];
  var gridLines = '', yLabels = '';
  for (var i = 0; i < yLevels.length; i++) {
    var gy = py(yLevels[i]);
    gridLines += '<line x1="' + pl + '" y1="' + gy + '" x2="' + (pl + iw) + '" y2="' + gy + '" stroke="#252525" stroke-width="1"/>';
    yLabels   += '<text x="' + (pl - 6) + '" y="' + (parseFloat(gy) + 4) + '" text-anchor="end" fill="#555" font-size="11">' + yLevels[i] + '</text>';
  }

  // X time labels every 2 hours
  var xLabels = '', xTicks = '';
  var step = 7200;
  var firstTick = Math.ceil(minT / step) * step;
  for (var t = firstTick; t <= maxT; t += step) {
    var lx = px(t);
    var d = new Date(t * 1000);
    var label = ('0' + d.getUTCHours()).slice(-2) + ':00';
    xTicks  += '<line x1="' + lx + '" y1="' + (pt + ih) + '" x2="' + lx + '" y2="' + (pt + ih + 4) + '" stroke="#444" stroke-width="1"/>';
    xLabels += '<text x="' + lx + '" y="' + (pt + ih + 16) + '" text-anchor="middle" fill="#555" font-size="11">' + label + ' UTC</text>';
  }

  container.innerHTML =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">' +
    gridLines +
    '<path d="' + areaPts + '" fill="rgba(59,130,246,0.1)"/>' +
    '<path d="' + linePts + '" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    yLabels + xTicks + xLabels +
    '</svg>';
}

function fmtTime(ts) {
  if (!ts) return '';
  var t = String(ts).split(' ')[1] || '';
  return t.substring(0, 5);
}

function renderRecent(recent, newSections) {
  var html = '';
  for (var i = 0; i < recent.length; i++) {
    var r = recent[i];
    var isNew = r.section && newSections.has(r.section);
    var color = BAND_COLORS[r.band] || '#555';
    var rowCls = isNew ? 'qso-row new-section' : 'qso-row';
    var secCls = r.section ? 'qso-section' : 'qso-section dim';
    html += '<div class="' + rowCls + '">';
    html += '<div class="qso-time">' + fmtTime(r.ts) + '</div>';
    html += '<div class="qso-call">' + (r.call || '') + '</div>';
    html += '<div class="qso-band" style="background:' + color + ';color:#000">' + (r.band || '') + '</div>';
    html += '<div class="' + secCls + '">' + (r.section || '—') + '</div>';
    html += '<div class="qso-op">' + (r.operator || '') + '</div>';
    html += '</div>';
  }
  document.getElementById('qso-list').innerHTML = html;
}

function renderSections(worked, newSections) {
  lastWorked = worked;
  var container = document.getElementById('sec-groups');
  var html = '';
  for (var group in SECTIONS) {
    var list = SECTIONS[group];
    var filtered = showNeeded ? list.filter(function(s) { return !worked.has(s); }) : list;
    if (showNeeded && filtered.length === 0) continue;
    html += '<div>';
    html += '<div class="sec-group-label">' + group + '</div>';
    html += '<div class="sec-wrap">';
    for (var i = 0; i < filtered.length; i++) {
      var s = filtered[i];
      var cls = worked.has(s) ? 'sec worked' : 'sec unworked';
      if (newSections.has(s)) cls += ' flash';
      html += '<span class="' + cls + '">' + s + '</span>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function renderBands(byBand) {
  var max = 1;
  for (var i = 0; i < byBand.length; i++) { if (byBand[i].count > max) max = byBand[i].count; }
  var html = '';
  for (var i = 0; i < byBand.length; i++) {
    var b = byBand[i];
    var pct = (b.count / max * 100).toFixed(1);
    var color = BAND_COLORS[b.band] || '#555';
    html += '<div class="band-row">';
    html += '<div class="band-name">' + b.band + '</div>';
    html += '<div class="band-track"><div class="band-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
    html += '<div class="band-count">' + b.count + '</div>';
    html += '</div>';
  }
  document.getElementById('band-list').innerHTML = html;
}

function renderOperators(byOp) {
  var top = byOp.slice(0, 15);
  var max = top.length > 0 ? top[0].count : 1;
  var html = '';
  for (var i = 0; i < top.length; i++) {
    var o = top[i];
    var pct = (o.count / max * 100).toFixed(1);
    html += '<div class="op-row">';
    html += '<div class="op-rank">' + (i + 1) + '</div>';
    html += '<div class="op-call">' + (o.operator || '?') + '</div>';
    html += '<div class="op-track"><div class="op-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="op-count">' + o.count + '</div>';
    html += '</div>';
  }
  document.getElementById('op-list').innerHTML = html;
}

async function fetchStats() {
  try {
    var res = await fetch('/api/stats');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var d = await res.json();

    document.getElementById('total').textContent = Number(d.total).toLocaleString();
    document.getElementById('rate-hour').textContent = d.rateLastHour != null ? d.rateLastHour : '—';
    document.getElementById('rate-10').textContent = d.rateLast10 != null ? d.rateLast10 : '—';
    document.getElementById('score').textContent = d.score != null ? Number(d.score).toLocaleString() : '—';
    renderMode(d.byMode);
    renderOnAir(d.radios);
    renderChart(d.cumulative);

    var worked = new Set(d.sectionsWorked || []);

    // Detect newly worked sections (skip on first load)
    var newSections = new Set();
    if (prevWorked !== null) {
      worked.forEach(function(s) {
        if (!prevWorked.has(s)) newSections.add(s);
      });
    }
    prevWorked = worked;

    document.getElementById('sec-count').textContent = worked.size;
    document.getElementById('sec-fraction').textContent = worked.size + ' / ' + TOTAL_SECTIONS;

    renderBands(d.byBand || []);
    renderOperators(d.byOperator || []);
    renderRecent(d.recent || [], newSections);
    renderSections(worked, newSections);
    updateMap(worked);

    document.getElementById('dot').className = 'dot live';
    document.getElementById('updated-time').textContent =
      'Updated ' + new Date(d.updated).toLocaleTimeString();
  } catch (err) {
    document.getElementById('dot').className = 'dot error';
    document.getElementById('updated-time').textContent = 'Error: ' + err.message;
  }
}

fetchStats();
setInterval(fetchStats, 10000);
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Section map ──────────────────────────────────────────────────────────────

// State/province name → ARRL sections (state name matches GeoJSON properties.name)
var STATE_SECTIONS = {
  "Connecticut":["CT"], "Massachusetts":["EMA","WMA"],
  "Maine":["ME"], "New Hampshire":["NH"], "Rhode Island":["RI"], "Vermont":["VT"],
  "New York":["ENY","NLI","NNY","WNY"], "New Jersey":["NNJ","SNJ"],
  "Delaware":["DE"], "Pennsylvania":["EPA","WPA"], "Maryland":["MDC"],
  "Illinois":["IL"], "Indiana":["IN"], "Wisconsin":["WI"],
  "Kentucky":["KY"], "Michigan":["MI"], "Ohio":["OH"],
  "Minnesota":["MN"], "North Dakota":["ND"], "South Dakota":["SD"],
  "Arkansas":["AR"], "Louisiana":["LA"], "Mississippi":["MS"], "Tennessee":["TN"],
  "Iowa":["IA"], "Kansas":["KS"], "Missouri":["MO"], "Nebraska":["NE"],
  "Colorado":["CO"], "New Mexico":["NM"], "Utah":["UT"], "Wyoming":["WY"],
  "Alaska":["AK"], "Washington":["EWA","WWA"],
  "Idaho":["ID"], "Montana":["MT"], "Oregon":["OR"],
  "California":["EB","LAX","ORG","SCV","SB","SDG","SF","SJV","SV"],
  "Nevada":["NV"], "Arizona":["AZ"],
  "Alabama":["AL"], "Georgia":["GA"], "Florida":["NFL","SFL","WCF"],
  "North Carolina":["NC"], "South Carolina":["SC"],
  "Virginia":["VA"], "West Virginia":["WV"],
  "Texas":["NTX","STX","WTX"], "Oklahoma":["OK"],
};

var PROVINCE_SECTIONS = {
  "Alberta":["AB"], "British Columbia":["BC"],
  "Ontario":["GH","ONE","ONN","ONS"],
  "Manitoba":["MB"], "New Brunswick":["NB"],
  "Newfoundland and Labrador":["NL"],
  "Nova Scotia":["NS"], "Prince Edward Island":["PE"],
  "Quebec":["QC"], "Saskatchewan":["SK"],
  "Northwest Territories":["TER"], "Yukon":["TER"], "Nunavut":["TER"],
};

var mapWorked = new Set();
var usLayer = null, caLayer = null;

function geoStyle(name, mapping) {
  var sections = mapping[name] || [];
  if (sections.length === 0) return { fillColor:'#111', fillOpacity:0.5, color:'#222', weight:0.5 };
  var workedCount = sections.filter(function(s){ return mapWorked.has(s); }).length;
  if (workedCount === 0)               return { fillColor:'#1a2e1a', fillOpacity:0.8, color:'#2a3a2a', weight:1 };
  if (workedCount === sections.length) return { fillColor:'#22c55e', fillOpacity:0.75, color:'#16a34a', weight:1 };
  return                                      { fillColor:'#86efac', fillOpacity:0.7,  color:'#22c55e', weight:1 };
}

function geoTooltip(name, mapping) {
  var sections = mapping[name] || [];
  if (sections.length === 0) return null;
  var html = '<b>' + name + '</b><br>';
  html += sections.map(function(s) {
    var color = mapWorked.has(s) ? '#22c55e' : '#555';
    return '<span style="color:' + color + ';font-weight:700">' + s + '</span>';
  }).join(' ');
  return html;
}

function makeLayer(data, mapping) {
  return L.geoJSON(data, {
    style: function(f) {
      return geoStyle(f.properties.name, mapping);
    },
    onEachFeature: function(f, layer) {
      var tip = geoTooltip(f.properties.name, mapping);
      if (tip) layer.bindTooltip(tip, { sticky: true });
    }
  });
}

function updateMap(worked) {
  mapWorked = worked;
  if (usLayer) usLayer.setStyle(function(f){ return geoStyle(f.properties.name, STATE_SECTIONS); });
  if (caLayer) caLayer.setStyle(function(f){ return geoStyle(f.properties.name, PROVINCE_SECTIONS); });
}

var sectionMap = L.map('section-map', { zoomSnap: 0.5 }).setView([47, -95], 3.5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 10,
}).addTo(sectionMap);

Promise.all([
  fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json').then(function(r){ return r.json(); }),
  fetch('https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/canada.geojson').then(function(r){ return r.json(); }),
]).then(function(results) {
  usLayer = makeLayer(results[0], STATE_SECTIONS).addTo(sectionMap);
  caLayer = makeLayer(results[1], PROVINCE_SECTIONS).addTo(sectionMap);
  updateMap(lastWorked);
}).catch(function(e) {
  console.warn('Map GeoJSON load failed:', e);
});
</script>
